server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: agent-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
  sql:
    init:
      mode: never
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    encoding: UTF-8
    placeholder-replacement: false
  redis:
    host: ${SPRING_REDIS_HOST}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    database: ${SPRING_REDIS_DATABASE:0}
    timeout: ${SPRING_REDIS_TIMEOUT:3s}
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:12MB}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.jobbuddy.backend.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

knife4j:
  enable: ${KNIFE4J_ENABLE:true}
  setting:
    enableOpenApi: true
    enableOperationSecurity: true

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    persistAuthorization: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

agent:
  mvp:
    max-loop-steps: ${AGENT_MVP_MAX_LOOP_STEPS:3}
  services:
    intent-url: ${AGENT_INTENT_URL}
    memory-url: ${AGENT_MEMORY_URL}
    tool-url: ${AGENT_TOOL_URL}
    eval-url: ${AGENT_EVAL_URL}
    runtime-url: ${AGENT_RUNTIME_URL:http://127.0.0.1:8010}
    sandbox-url: ${AGENT_SANDBOX_URL:http://127.0.0.1:8000}
    connect-timeout: ${AGENT_SERVICE_CONNECT_TIMEOUT:2s}
    read-timeout: ${AGENT_SERVICE_READ_TIMEOUT:75s}
    stream-connect-timeout: ${AGENT_SERVICE_STREAM_CONNECT_TIMEOUT:10s}
    stream-read-timeout: ${AGENT_SERVICE_STREAM_READ_TIMEOUT:180s}
    max-attempts: ${AGENT_SERVICE_MAX_ATTEMPTS:2}
    retry-backoff: ${AGENT_SERVICE_RETRY_BACKOFF:200ms}
    circuit-failure-threshold: ${AGENT_SERVICE_CIRCUIT_FAILURE_THRESHOLD:5}
    circuit-open-duration: ${AGENT_SERVICE_CIRCUIT_OPEN_DURATION:15s}

job-buddy:
  default-user-id: ${JOB_BUDDY_DEFAULT_USER_ID:default-user}
  max-jobs-per-recommend: ${JOB_BUDDY_MAX_JOBS_PER_RECOMMEND:15}
  boss-live-enabled: ${JOB_BUDDY_BOSS_LIVE_ENABLED:true}
  boss-web-base-url: ${JOB_BUDDY_BOSS_WEB_BASE_URL:https://www.zhipin.com}
  intent-safety-gate-enabled: ${JOB_BUDDY_INTENT_SAFETY_GATE_ENABLED:false}
  runtime-max-turns: ${JOB_BUDDY_RUNTIME_MAX_TURNS:4}
  runtime-max-tool-calls: ${JOB_BUDDY_RUNTIME_MAX_TOOL_CALLS:4}
  runtime-max-failures: ${JOB_BUDDY_RUNTIME_MAX_FAILURES:2}
  max-resume-bytes: ${JOB_BUDDY_MAX_RESUME_BYTES:5242880}
  resume-runtime-workspace: ${JOB_BUDDY_RESUME_RUNTIME_WORKSPACE:}
  auth:
    enabled: ${JOB_BUDDY_AUTH_ENABLED:true}
    internal-api-token: ${JOB_BUDDY_INTERNAL_API_TOKEN:}
    asset-url-signing-key: ${JOB_BUDDY_ASSET_URL_SIGNING_KEY:}
    asset-url-ttl-seconds: ${JOB_BUDDY_ASSET_URL_TTL_SECONDS:3600}
  minio:
    endpoint: ${JOB_BUDDY_MINIO_ENDPOINT}
    access-key: ${JOB_BUDDY_MINIO_ACCESS_KEY}
    secret-key: ${JOB_BUDDY_MINIO_SECRET_KEY}
    bucket: ${JOB_BUDDY_MINIO_BUCKET}
    region: ${JOB_BUDDY_MINIO_REGION:}
    secure: ${JOB_BUDDY_MINIO_SECURE:true}

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr([req=%X{request_id:-},sess=%X{session_id:-},op=%X{operator_id:-},run=%X{run_id:-}]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
