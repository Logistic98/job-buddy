server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: agent-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:10000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:3000}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:600000}
      keepalive-time: ${SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME:120000}
  sql:
    init:
      mode: never
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: false
    encoding: UTF-8
    placeholder-replacement: false
  data:
    redis:
      host: ${SPRING_REDIS_HOST}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      database: ${SPRING_REDIS_DATABASE:0}
      timeout: ${SPRING_REDIS_TIMEOUT:3s}
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:1GB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:1025MB}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.jobbuddy.backend.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

knife4j:
  # Knife4j 4.5 enhancement customizer is incompatible with SpringDoc 2.8;
  # keep the doc.html UI while SpringDoc provides the OpenAPI document.
  enable: ${KNIFE4J_ENABLE:false}
  setting:
    enableOpenApi: true
    enableOperationSecurity: true

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    persistAuthorization: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

agent:
  services:
    intent-url: ${AGENT_INTENT_URL}
    memory-url: ${AGENT_MEMORY_URL}
    tool-url: ${AGENT_TOOL_URL}
    eval-url: ${AGENT_EVAL_URL}
    runtime-url: ${AGENT_RUNTIME_URL:http://127.0.0.1:8010}
    sandbox-url: ${AGENT_SANDBOX_URL:http://127.0.0.1:8061}
    internal-service-token: ${AGENT_INTERNAL_SERVICE_TOKEN:}
    connect-timeout: ${AGENT_SERVICE_CONNECT_TIMEOUT:2s}
    read-timeout: ${AGENT_SERVICE_READ_TIMEOUT:135s}
    stream-connect-timeout: ${AGENT_SERVICE_STREAM_CONNECT_TIMEOUT:10s}
    stream-read-timeout: ${AGENT_SERVICE_STREAM_READ_TIMEOUT:180s}
    stream-heartbeat-interval: ${AGENT_SERVICE_STREAM_HEARTBEAT_INTERVAL:10s}
    stream-core-threads: ${AGENT_SERVICE_STREAM_CORE_THREADS:4}
    stream-max-threads: ${AGENT_SERVICE_STREAM_MAX_THREADS:64}
    stream-queue-capacity: ${AGENT_SERVICE_STREAM_QUEUE_CAPACITY:128}
    stream-max-global: ${AGENT_SERVICE_STREAM_MAX_GLOBAL:96}
    stream-max-per-tenant: ${AGENT_SERVICE_STREAM_MAX_PER_TENANT:48}
    stream-max-per-user: ${AGENT_SERVICE_STREAM_MAX_PER_USER:6}
    max-attempts: ${AGENT_SERVICE_MAX_ATTEMPTS:2}
    retry-backoff: ${AGENT_SERVICE_RETRY_BACKOFF:200ms}
    circuit-failure-threshold: ${AGENT_SERVICE_CIRCUIT_FAILURE_THRESHOLD:5}
    circuit-open-duration: ${AGENT_SERVICE_CIRCUIT_OPEN_DURATION:15s}

job-buddy:
  environment: ${JOB_BUDDY_ENVIRONMENT:development}
  default-user-id: ${JOB_BUDDY_DEFAULT_USER_ID:default-user}
  cors-allowed-origins: ${JOB_BUDDY_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  chat:
    redis-failure-cooldown: ${CHAT_REDIS_FAILURE_COOLDOWN:30s}
  max-jobs-per-recommend: ${JOB_BUDDY_MAX_JOBS_PER_RECOMMEND:15}
  recommend-overfetch-factor: ${JOB_BUDDY_RECOMMEND_OVERFETCH_FACTOR:5}
  max-jobs-per-scoring: ${JOB_BUDDY_MAX_JOBS_PER_SCORING:80}
  minimum-recommended-match-score: ${JOB_BUDDY_MINIMUM_RECOMMENDED_MATCH_SCORE:60}
  boss-search-max-pages: ${BOSS_SEARCH_MAX_PAGES:2}
  boss-search-max-page-depth: ${BOSS_SEARCH_MAX_PAGE_DEPTH:5}
  boss-search-cache-ttl-minutes: ${BOSS_SEARCH_CACHE_TTL_MINUTES:30}
  boss-search-cooldown-minutes-on-risk: ${BOSS_SEARCH_COOLDOWN_MINUTES_ON_RISK:30}
  boss-web-base-url: ${JOB_BUDDY_BOSS_WEB_BASE_URL:https://www.zhipin.com}
  intent-safety-gate-enabled: ${JOB_BUDDY_INTENT_SAFETY_GATE_ENABLED:false}
  runtime-max-turns: ${JOB_BUDDY_RUNTIME_MAX_TURNS:4}
  runtime-max-tool-calls: ${JOB_BUDDY_RUNTIME_MAX_TOOL_CALLS:4}
  runtime-max-failures: ${JOB_BUDDY_RUNTIME_MAX_FAILURES:2}
  runtime-max-tokens: ${JOB_BUDDY_RUNTIME_MAX_TOKENS:32768}
  max-resume-bytes: ${JOB_BUDDY_MAX_RESUME_BYTES:5242880}
  resume-runtime-workspace: ${JOB_BUDDY_RESUME_RUNTIME_WORKSPACE:}
  resume-writer-version-limit: ${JOB_BUDDY_RESUME_WRITER_VERSION_LIMIT:30}
  auth:
    enabled: ${JOB_BUDDY_AUTH_ENABLED:true}
    internal-api-token: ${JOB_BUDDY_INTERNAL_API_TOKEN:}
    asset-url-signing-key: ${JOB_BUDDY_ASSET_URL_SIGNING_KEY:}
    asset-url-ttl-seconds: ${JOB_BUDDY_ASSET_URL_TTL_SECONDS:3600}
    boss-credential-encryption-key: ${JOB_BUDDY_BOSS_CREDENTIAL_ENCRYPTION_KEY:}
  minio:
    endpoint: ${JOB_BUDDY_MINIO_ENDPOINT}
    access-key: ${JOB_BUDDY_MINIO_ACCESS_KEY}
    secret-key: ${JOB_BUDDY_MINIO_SECRET_KEY}
    bucket: ${JOB_BUDDY_MINIO_BUCKET}
    region: ${JOB_BUDDY_MINIO_REGION:}
    secure: ${JOB_BUDDY_MINIO_SECURE:true}
    signature-version: ${JOB_BUDDY_MINIO_SIGNATURE_VERSION:v4}

logging:
  level:
    org.apache.catalina.connector.CoyoteAdapter: WARN
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr([req=%X{request_id:-},sess=%X{session_id:-},op=%X{operator_id:-},run=%X{run_id:-}]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
