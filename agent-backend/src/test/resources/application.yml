spring:
  datasource:
    url: jdbc:h2:mem:agent_backend_test;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:/schema-test.sql
  flyway:
    enabled: false

job-buddy:
  auth:
    enabled: false
    asset-url-signing-key: test-asset-signing-key
  minio:
    endpoint: https://minio.example.com
    access-key: test-access-key
    secret-key: test-secret-key
    bucket: job-buddy-test-resumes
